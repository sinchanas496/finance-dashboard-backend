<!DOCTYPE html>
<html>
<head>
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card glass">
    <h2>🔐 Finance Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <div class="topbar">
      <h2>💰 Finance Dashboard</h2>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
<div class="stats">
  <div class="card stat income">Income: ₹<span id="income">0</span></div>
  <div class="card stat expense">Expense: ₹<span id="expense">0</span></div>
  <div class="card stat balance">Balance: ₹<span id="balance">0</span></div>
</div>

    <!-- ADD FORM -->
    <div id="formBox" class="card glass">
      <h3>Add Transaction</h3>
      <input id="amount" placeholder="Amount">
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <input id="category" placeholder="Category">
      <button onclick="addTransaction()">Add</button>
    </div>

    <!-- CHART -->
    <div class="card glass">
      <canvas id="chart"></canvas>
    </div>

    <!-- LIST -->
    <div class="card glass">
      <h3>Transactions</h3>
      <ul id="list"></ul>
    </div>

  </div>

</div>

<script src="app-frontend.js"></script>
</body>
</html>
